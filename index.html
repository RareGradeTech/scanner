<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Employee Attendance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            overflow: hidden;
            overscroll-behavior-y: contain;
            -webkit-tap-highlight-color: transparent;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            color: #0f172a;
        }
        .app-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        #login-view {
            transition: all 0.4s ease-in-out;
            transform: translateY(100%);
            opacity: 0;
            z-index: 100;
            position: fixed;
            inset: 0;
            display: none;
            background: #f8fafc;
        }
        #login-view.active {
            display: flex;
            transform: translateY(0);
            opacity: 1;
        }
        .blur-locked {
            filter: blur(8px);
            pointer-events: none;
        }
        #reader {
            width: 100% !important;
            border-radius: 1rem;
            overflow: hidden;
            background: #f1f5f9;
        }
        #reader video {
            width: 100% !important;
            object-fit: cover;
            display: block;
        }
        .nav-item {
            color: #64748b;
            transition: color 0.2s;
        }
        .nav-item.active {
            color: #2563eb;
        }
        .log-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #toast {
            bottom: max(80px, env(safe-area-inset-bottom) + 80px);
        }
        /* Hide file input */
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col relative">

    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-blue-100 p-2 rounded-lg text-blue-600">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <span class="font-bold tracking-wide text-gray-800">Attendance<span class="text-blue-600">Hub</span></span>
        </div>
        <div class="text-xs font-semibold text-gray-600 bg-gray-100 px-3 py-1.5 rounded-full" id="clock">00:00:00</div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-1 overflow-y-auto pb-24 px-4 pt-6 w-full max-w-lg mx-auto transition-all">
        
        <!-- ================= HOME VIEW ================= -->
        <section id="view-home" class="space-y-6">
            <div class="app-card p-6 flex items-center gap-4">
                <img id="home-avatar" src="https://ui-avatars.com/api/?name=User&background=eff6ff&color=2563eb" class="w-16 h-16 rounded-full object-cover border-2 border-gray-100" alt="Profile">
                <div>
                    <h2 class="text-xl font-bold text-gray-900" id="home-name">Welcome</h2>
                    <p class="text-sm text-gray-500" id="home-role">Employee Portal</p>
                </div>
            </div>

            <div class="app-card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-800"><i class="fa-regular fa-clock mr-2 text-blue-500"></i>Today's Activity</h3>
                    <span id="hours-worked" class="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded">0h 0m</span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="log-box">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Time In</span>
                        <span id="log-in" class="text-sm font-semibold text-gray-800">--:--</span>
                    </div>
                    <div class="log-box">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Lunch Out</span>
                        <span id="log-lout" class="text-sm font-semibold text-gray-800">--:--</span>
                    </div>
                    <div class="log-box">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Lunch Back</span>
                        <span id="log-lback" class="text-sm font-semibold text-gray-800">--:--</span>
                    </div>
                    <div class="log-box">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Time Out</span>
                        <span id="log-out" class="text-sm font-semibold text-gray-800">--:--</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= SCANNER VIEW ================= -->
        <section id="view-scanner" class="hidden space-y-6 h-full flex flex-col">
            
            <div id="location-overlay" class="app-card p-8 text-center space-y-4">
                <div class="inline-block bg-blue-50 p-4 rounded-full text-blue-500 mb-2">
                    <i class="fa-solid fa-location-dot text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold">Verify Location</h3>
                <p class="text-sm text-gray-500">You must be at the office to log attendance.</p>
                <button onclick="detectAndVerifyLocation()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition-colors mt-4">
                    Check GPS
                </button>
            </div>

            <div id="scanner-interface" class="hidden flex-1 flex flex-col space-y-6">
                <div class="app-card p-4">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <h2 class="font-bold text-gray-800">Scan QR Code</h2>
                    </div>
                    <div id="reader-container" class="w-full aspect-square overflow-hidden relative">
                        <div id="reader"></div>
                    </div>
                </div>

                <div class="text-center text-sm text-gray-400 font-semibold uppercase">OR</div>

                <button onclick="logWithBiometrics()" class="w-full py-4 bg-white border-2 border-gray-200 text-gray-700 rounded-2xl font-bold shadow-sm active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-fingerprint text-blue-500 text-xl"></i>
                    Use Device Biometrics
                </button>
            </div>
        </section>

        <!-- ================= PROFILE VIEW ================= -->
        <section id="view-profile" class="hidden space-y-6">
            <div class="app-card p-6 text-center">
                <div class="relative inline-block mb-4">
                    <img id="profile-img" src="https://ui-avatars.com/api/?name=User" class="w-24 h-24 rounded-full object-cover border-4 border-white shadow-lg mx-auto">
                    <label for="image-upload" class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full cursor-pointer shadow-md hover:bg-blue-700 transition">
                        <i class="fa-solid fa-camera text-sm"></i>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
                </div>
                
                <div class="space-y-4 text-left mt-6">
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Full Name</label>
                        <input type="text" id="edit-name" class="w-full mt-1 p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="Your Name">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 uppercase">Email Address</label>
                        <input type="email" id="edit-email" readonly class="w-full mt-1 p-3 bg-gray-100 border border-gray-200 rounded-xl text-gray-500 outline-none cursor-not-allowed">
                    </div>
                    <button onclick="saveProfile()" class="w-full py-3 bg-gray-900 text-white rounded-xl font-semibold hover:bg-gray-800 transition-colors">
                        Save Changes
                    </button>
                </div>
            </div>

            <button onclick="signOutUser()" class="w-full py-3 text-red-600 bg-red-50 font-bold rounded-xl hover:bg-red-100 transition-colors">
                Sign Out
            </button>
        </section>

    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-20 pb-[env(safe-area-inset-bottom)]">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('home')" class="nav-item active flex flex-col items-center justify-center w-full h-full" id="nav-home">
                <i class="fa-solid fa-house text-lg mb-1"></i>
                <span class="text-[10px] font-semibold">Home</span>
            </button>
            <button onclick="switchTab('scanner')" class="nav-item flex flex-col items-center justify-center w-full h-full relative" id="nav-scanner">
                <div class="absolute -top-5 bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-qrcode text-xl"></i>
                </div>
                <span class="text-[10px] font-semibold mt-6">Scan</span>
            </button>
            <button onclick="switchTab('profile')" class="nav-item flex flex-col items-center justify-center w-full h-full" id="nav-profile">
                <i class="fa-regular fa-user text-lg mb-1"></i>
                <span class="text-[10px] font-semibold">Profile</span>
            </button>
        </div>
    </nav>

    <!-- Login View -->
    <div id="login-view" class="flex-col justify-center items-center p-6">
        <div class="w-full max-w-md text-center space-y-8">
            <div class="bg-blue-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto shadow-sm">
                <i class="fa-solid fa-fingerprint text-blue-600 text-4xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Portal Access</h1>
                <p class="text-gray-500 mt-2">Sign in with your registered company account.</p>
            </div>
            <button onclick="signInWithGoogle()"
                    class="w-full py-4 bg-white border border-gray-200 text-gray-800 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-sm hover:bg-gray-50 active:scale-95 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Continue with Google
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed left-4 right-4 bg-gray-900 text-white px-4 py-3 rounded-xl shadow-2xl transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-[200] font-semibold text-sm text-center flex justify-center items-center max-w-sm mx-auto">
        <span id="toastMsg">Notification</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
            authDomain: "test-17881.firebaseapp.com",
            projectId: "test-17881",
            storageBucket: "test-17881.firebasestorage.app",
            messagingSenderId: "1057428047643",
            appId: "1:1057428047643:web:f3801c0d933225a5cd35be"
        };
        
        // Cloudinary Config (Required for Image Upload)
        const CLOUDINARY_UPLOAD_PRESET = "banter_box";
        const CLOUDINARY_CLOUD_NAME = "dqkujefxj";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        
        let currentUserData = null;
        let html5QrCode = null;
        let lastScannedId = null;
        let scanTimeout = null;
        let locationVerified = false;

        // --- UI ROUTING ---
        function switchTab(tabId) {
            document.querySelectorAll('main > section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'text-blue-600'));
            document.getElementById(`nav-${tabId}`).classList.add('active', 'text-blue-600');

            // Handle scanner lifecycle to save battery
            if (tabId === 'scanner' && locationVerified) {
                startScanner();
            } else if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().catch(() => {});
            }
        }

        function showPortal() {
            document.getElementById('login-view').classList.add('active');
            document.getElementById('app-content').classList.add('hidden');
            document.querySelector('nav').classList.add('hidden');
        }
        
        function closePortal() {
            document.getElementById('login-view').classList.remove('active');
            document.getElementById('app-content').classList.remove('hidden');
            document.querySelector('nav').classList.remove('hidden');
            switchTab('home'); // Default to home
        }

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const snap = await db.ref('employees').orderByChild('email').equalTo(user.email.toLowerCase()).once('value');
                if (snap.exists()) {
                    const data = snap.val();
                    const key = Object.keys(data)[0];
                    currentUserData = { ...data[key], id: key };
                    
                    // Populate Profile & Home UI
                    updateUIWithUserData();
                    listenToAttendance();
                    closePortal();
                } else {
                    showToast("Not registered - Alert sent to admin");
                    await auth.signOut();
                    showPortal();
                }
            } else { 
                showPortal(); 
            }
        });

        async function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } 
            catch (error) { showToast(error.message ? error.message.split('.')[0] : "Login failed"); }
        }

        async function signOutUser() {
            if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop().catch(() => {});
            await auth.signOut();
            currentUserData = null;
            locationVerified = false;
            document.getElementById('location-overlay').classList.remove('hidden');
            document.getElementById('scanner-interface').classList.add('hidden');
            showPortal();
        }

        // --- PROFILE & UPLOAD LOGIC ---
        function updateUIWithUserData() {
            const name = currentUserData.name || "Employee";
            const dp = currentUserData.profilePic || `https://ui-avatars.com/api/?name=${name}&background=eff6ff&color=2563eb`;
            
            document.getElementById('home-name').innerText = name;
            document.getElementById('home-avatar').src = dp;
            document.getElementById('profile-img').src = dp;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-email').value = currentUserData.email;
        }

        async function saveProfile() {
            const newName = document.getElementById('edit-name').value.trim();
            if(!newName) return showToast("Name cannot be empty");
            
            try {
                await db.ref(`employees/${currentUserData.id}`).update({ name: newName });
                currentUserData.name = newName;
                updateUIWithUserData();
                showToast("Profile Updated");
            } catch(e) { showToast("Failed to update profile"); }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            
            showToast("Uploading picture...");
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(data.secure_url) {
                    await db.ref(`employees/${currentUserData.id}`).update({ profilePic: data.secure_url });
                    currentUserData.profilePic = data.secure_url;
                    updateUIWithUserData();
                    showToast("Picture Updated Successfully");
                } else {
                    throw new Error(data.error.message);
                }
            } catch(e) {
                console.error(e);
                showToast("Upload Failed. Ensure your preset is 'Unsigned'.");
            }
        }

        // --- ATTENDANCE & HOURS LOGIC ---
        function listenToAttendance() {
            if (!currentUserData) return;
            const today = new Date().toISOString().split('T')[0];
            db.ref(`attendance/${today}/${currentUserData.id}`).on('value', (snap) => {
                const data = snap.val() || {};
                const tIn = data.TimeIn || '--:--';
                const tOut = data.TimeOut || '--:--';
                
                document.getElementById('log-in').innerText = tIn;
                document.getElementById('log-lout').innerText = data.LunchOut || '--:--';
                document.getElementById('log-lback').innerText = data.LunchBack || '--:--';
                document.getElementById('log-out').innerText = tOut;

                calculateHours(data.TimeIn, data.TimeOut);
            });
        }

        function calculateHours(timeIn, timeOut) {
            const display = document.getElementById('hours-worked');
            if (!timeIn) {
                display.innerText = "0h 0m";
                return;
            }

            const [inH, inM] = timeIn.split(':').map(Number);
            let outH, outM;

            if (timeOut) {
                [outH, outM] = timeOut.split(':').map(Number);
            } else {
                const now = new Date();
                outH = now.getHours();
                outM = now.getMinutes();
            }

            let diffMins = (outH * 60 + outM) - (inH * 60 + inM);
            if (diffMins < 0) diffMins = 0; // Prevent negative if cross midnight logic isn't needed

            const h = Math.floor(diffMins / 60);
            const m = diffMins % 60;
            display.innerText = `${h}h ${m}m`;
        }

        // --- SCANNER & LOCATION LOGIC ---
        async function detectAndVerifyLocation() {
            showToast("Verifying location...");
            if (!navigator.geolocation) return showToast("GPS Not Supported");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const userLat = pos.coords.latitude;
                const userLon = pos.coords.longitude;
                const snap = await db.ref('settings/officeLocation').once('value');
                
                if (!snap.exists()) return showToast("Admin hasn't set office location");
                
                const adminConfig = snap.val();
                const distance = calculateDistance(userLat, userLon, adminConfig.lat, adminConfig.lng);
                
                if (distance <= (adminConfig.radius || 150)) {
                    locationVerified = true;
                    document.getElementById('location-overlay').classList.add('hidden');
                    document.getElementById('scanner-interface').classList.remove('hidden');
                    startScanner();
                } else {
                    showToast(`Outside Range (${Math.round(distance)}m)`);
                }
            }, () => { showToast("Please grant GPS permission"); }, { enableHighAccuracy: true });
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        async function startScanner() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            if (!html5QrCode.isScanning) {
                try { await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess); } 
                catch (e) { console.error("Scanner failed to start"); }
            }
        }

        function onScanSuccess(decodedText) {
            const scannedId = decodedText.trim().toString();
            if (scannedId === lastScannedId) return;
            
            const storedId = currentUserData.id.toString().trim();
            if (scannedId !== storedId) {
                showToast(`ID Mismatch`);
                return;
            }

            lastScannedId = scannedId;
            clearTimeout(scanTimeout);
            scanTimeout = setTimeout(() => { lastScannedId = null; }, 5000);

            processAttendanceUpdate(storedId);
        }

        async function logWithBiometrics() {
            if (!currentUserData) return showToast("Not authenticated");
            
            if (!window.PublicKeyCredential) {
                return showToast("Biometrics not supported in this browser");
            }

            try {
                const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                if (!available) {
                    return showToast("No biometric sensor detected");
                }

                const userIdString = currentUserData.id.toString();
                const credKey = 'biometric_cred_' + userIdString;
                let credentialId = localStorage.getItem(credKey);
                
                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);
                
                const rpDomain = window.location.hostname || "localhost";

                if (!credentialId) {
                    const publicKey = {
                        challenge: challenge,
                        rp: { name: "AttendanceHub", id: rpDomain },
                        user: {
                            id: new Uint8Array(16), 
                            name: currentUserData.email,
                            displayName: currentUserData.name || "Employee"
                        },
                        pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                        timeout: 60000
                    };
                    
                    const cred = await navigator.credentials.create({ publicKey });
                    const base64Id = btoa(String.fromCharCode.apply(null, new Uint8Array(cred.rawId)));
                    localStorage.setItem(credKey, base64Id);
                    
                } else {
                    const binaryId = Uint8Array.from(atob(credentialId), c => c.charCodeAt(0));
                    const publicKey = {
                        challenge: challenge,
                        rpId: rpDomain,
                        allowCredentials: [{ type: "public-key", id: binaryId }],
                        userVerification: "required",
                        timeout: 60000
                    };
                    
                    await navigator.credentials.get({ publicKey });
                }

                processAttendanceUpdate(currentUserData.id);

            } catch (error) {
                console.error("Biometric Error:", error);
                showToast("Biometric verification cancelled or failed");
            }
        }

        function processAttendanceUpdate(employeeId) {
            if (window.isProcessingScan) return;
            window.isProcessingScan = true;

            const today = new Date().toISOString().split('T')[0];
            const nowTime = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
            
            db.ref(`attendance/${today}/${employeeId}`).once('value', (attSnap) => {
                let update = { name: currentUserData.name || "Employee", timestamp: firebase.database.ServerValue.TIMESTAMP };
                const att = attSnap.val();
                let actionLabel = "Logged";
                
                if (!att) { actionLabel = "Time In Recorded"; update.TimeIn = nowTime; } 
                else if (!att.LunchOut) { actionLabel = "Lunch Out Recorded"; update.LunchOut = nowTime; } 
                else if (!att.LunchBack) { actionLabel = "Lunch Back Recorded"; update.LunchBack = nowTime; } 
                else if (!att.TimeOut) { actionLabel = "Time Out Recorded"; update.TimeOut = nowTime; } 
                else { window.isProcessingScan = false; return showToast("Shift complete for today"); }
                
                db.ref(`attendance/${today}/${employeeId}`).update(update).then(() => {
                    showToast(`✅ ${actionLabel}`);
                    switchTab('home'); // Send them back to home to see the update
                    setTimeout(() => window.isProcessingScan = false, 2000);
                }).catch(() => { window.isProcessingScan = false; });
            });
        }

        // --- UTILS ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerHTML = msg;
            t.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none'), 3000);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        }, 1000);
    </script>
</body>
</html>
